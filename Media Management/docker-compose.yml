name: media-management

services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Los_Angeles
    ports:
      - "7878:7878"
    volumes:
      - radarr_config:/config
      - "/Volumes/Incidental Epoch/Streaming:/movies"
      - "/Volumes/Incidental Epoch/Downloads:/downloads"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Los_Angeles
    ports:
      - "8989:8989"
    volumes:
      - sonarr_config:/config
      - "/Volumes/Incidental Epoch/Streaming:/movies"
      - "/Volumes/Incidental Epoch/Downloads:/downloads"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Los_Angeles
    ports:
      - "6767:6767"
    volumes:
      - bazarr_config:/config
      - "/Volumes/Incidental Epoch/Streaming:/movies"
      - "/Volumes/Incidental Epoch/Streaming:/tv"

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Los_Angeles
    ports:
      - "9696:9696"
    volumes:
      - prowlarr_config:/config

volumes:
  radarr_config:
  sonarr_config:
  bazarr_config:
  prowlarr_config: