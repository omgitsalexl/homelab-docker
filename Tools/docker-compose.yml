name: tools

services:
  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    container_name: changedetection
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
      - HIDE_REFERER=true
      - PLAYWRIGHT_DRIVER_URL=ws://changedetection-browser-sockpuppet:3000
    ports:
      - "5050:5000/tcp"
    volumes:
      - changedetection_data:/datastore
    depends_on:
      changedetection-browser-sockpuppet:
        condition: service_started

  changedetection-browser-sockpuppet:
    image: dgtlmoon/sockpuppetbrowser:latest
    container_name: changedetection-browser-sockpuppet
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      - TZ=America/Los_Angeles
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1024
      - SCREEN_DEPTH=16
      - MAX_CONCURRENT_CHROME_PROCESSES=10
      
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Los_Angeles
    ports:
      - "8181:8181"
    volumes:
      - tautulli_config:/config

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    init: true
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Los_Angeles
    ports:
      - "5055:5055"
    volumes:
      - seerr_data:/app/config/
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    environment:
      - PUID=501
      - PGID=20
      - TZ=America/Los_Angeles
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
    ports:
      - "8265:8265"
      - "8266:8266"
    volumes:
      - tdarr_config:/app/configs/
      - tdarr_server:/app/server/
      - tdarr_cache:/cache/
      - "/Volumes/Incidental Epoch/Streaming:/movies"
  
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_ENCRYPTION_KEY}
    ports:
      - "7575:7575"
    volumes:
      - homarr_data:/appdata/

  rustfs_permissions:
    image: alpine:latest
    container_name: rustfs_permissions
    restart: no
    user: root
    volumes:
      - "/Volumes/Thermal Silencer/Buckets:/fix"
    command: chown -R 10001:10001 /fix

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - "/Volumes/Thermal Silencer/Buckets:/data"
      - rustfs_logs:/logs
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:9000/health && curl -f http://localhost:9001/rustfs/console/health"]
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    depends_on:
      rustfs_permissions:
        condition: service_completed_successfully

volumes:
  changedetection_data:
  tautulli_config:
  seerr_data:
  tdarr_config:
  tdarr_server:
  tdarr_cache:
  homarr_data:
  rustfs_logs: